<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ドキドキあみだくじショー</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Rampart+One&family=Zen+Kaku+Gothic+New:wght@400;700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="bg-layer"></div>
    <main class="app-shell">
      <header class="hero">
        <p class="eyebrow">SURPRISE DRAW SHOW</p>
        <h1>ドキドキあみだくじ</h1>
        <p class="sub">
          友人の運命を、最後の最後まで分からなくする演出付き。
        </p>
      </header>

      <section class="panel setup-panel">
        <div class="panel-head">
          <h2>参加者設定</h2>
        </div>
        <label for="nameInput">名前（1行に1人、2〜10名）</label>
        <textarea
          id="nameInput"
          placeholder="例）
佐藤
田中
鈴木
高橋"
        ></textarea>
        <div id="secretPanel" class="secret-panel" aria-hidden="true">
          <h3>管理者モード</h3>
          <label for="winnerSelect">固定当選者（出来レース）</label>
          <select id="winnerSelect"></select>
        </div>
        <div class="button-row">
          <button id="generateBtn" class="primary-btn" type="button">
            あみだ生成
          </button>
          <button id="startBtn" class="accent-btn" type="button" disabled>
            演出スタート
          </button>
        </div>
      </section>

      <section class="panel stage-panel">
        <div class="stage-top">
          <p id="statusText">参加者を入力して「あみだ生成」を押してください。</p>
        </div>
        <div id="boardWrap" class="board-wrap">
          <svg
            id="ladderSvg"
            viewBox="0 0 900 560"
            preserveAspectRatio="xMidYMid meet"
            aria-label="あみだくじボード"
            role="img"
          ></svg>
          <div id="flashOverlay" class="flash-overlay"></div>
          <div id="confettiLayer" class="confetti-layer"></div>
        </div>
      </section>

      <footer id="credit" class="credit">by 定例会幹事</footer>
    </main>

    <script src="script.js"></script>
  </body>
</html>
